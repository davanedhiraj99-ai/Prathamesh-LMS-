<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Prathamesh Sir's Secure Learning Management System" />
    <meta name="keywords" content="Commpetative Exam's" />
    <meta name="author" content="Prathamesh Sir's Educational Institute" />
    
    <!-- Security Headers (Handled by server, but good to have) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    
    <!-- Prevent copy/paste (additional layer) -->
    <style>
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
    </style>
    
    <title>Prathamesh Sir's LMS - Secure Learning Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Immediate Security Lockdown (before React loads) -->
    <script>
      // Disable right-click immediately
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
      }, true);

      // Disable DevTools shortcuts
      document.addEventListener('keydown', function(e) {
        // F12
        if (e.key === 'F12') {
          e.preventDefault();
          return false;
        }
        // Ctrl+Shift+I/J/C or Ctrl+U
        if ((e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || 
            (e.ctrlKey && e.key === 'u')) {
          e.preventDefault();
          return false;
        }
      }, true);
    </script>
  </body>
</html>
